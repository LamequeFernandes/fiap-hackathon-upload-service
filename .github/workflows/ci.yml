name: CI – upload-service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  SERVICE_NAME: upload-service

jobs:
  test:
    name: Testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - run: pytest tests/ -v --tb=short

  build-push:
    name: Build & Push ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/fiap-hackathon/${{ env.SERVICE_NAME }}:latest
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/fiap-hackathon/${{ env.SERVICE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-deploy:
    name: Aciona deploy na infra
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.INFRA_REPO_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: '${{ vars.INFRA_REPO_OWNER }}',
              repo:  '${{ vars.INFRA_REPO_NAME }}',
              event_type: 'image-updated',
              client_payload: {
                service: '${{ env.SERVICE_NAME }}',
                sha:     '${{ github.sha }}',
                actor:   '${{ github.actor }}'
              }
            })
            console.log('Deploy acionado para ${{ env.SERVICE_NAME }}@${{ github.sha }}')
